site_name: Longevity Research Library
site_description: Evidence-focused longevity enhancement research repository for a 74-year-old male
site_url: https://example.com/longevity-research-library/
repo_name: longevity-research-library
nav:
  - Home: index.md
  - Longevity for a 74-Year-Old Male:
      - Overview: topics/longevity-74-male/index.md
      - Evidence Map: topics/longevity-74-male/evidence-map.md
      - Intervention Watchlist: topics/longevity-74-male/intervention-watchlist.md
      - Biomarkers & Measurement: topics/longevity-74-male/biomarkers.md
      - Questions for Clinicians: topics/longevity-74-male/clinician-questions.md
      - Open Questions: topics/longevity-74-male/open-questions.md
  - Updates:
      - Latest Updates: updates/index.md
  - Policies:
      - Selection Policy: policies/selection-policy.md
      - Medical Safety Policy: policies/medical-safety-policy.md
theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: teal
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
plugins:
  - search
